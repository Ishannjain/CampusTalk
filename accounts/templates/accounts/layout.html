{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campus Connect{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
</head>
<body>
    <div class="bg-light py-2 mb-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <a href="{% url 'index' %}" class="h4 text-decoration-none text-dark">CampusConnect</a>
            </div>
            <nav>
                <a href="{% url 'index' %}" class="me-3">Home</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'common_chat' %}" class="me-3">Common Chat</a>
                    <a href="{% url 'profile' %}" class="me-3">Profile</a>
                    <a href="{% url 'logout' %}" class="text-danger">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="me-3">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </nav>
        </div>
    </div>
    <main class="container mt-4">
        {% block body %}{% endblock %}
    </main>
</body>
</html>
