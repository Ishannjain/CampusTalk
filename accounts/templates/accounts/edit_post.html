{% extends "accounts/layout.html" %}
{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark text-center">
                    <h3>Edit Post</h3>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <label for="{{ form.title.id_for_label }}" class="form-label">Title</label>
                            {{ form.title }}
                        </div>
                        <div class="form-group mb-3">
                            <label for="{{ form.body.id_for_label }}" class="form-label">Content</label>
                            {{ form.body }}
                        </div>
                        <div class="form-group mb-3">
                            <label for="{{ form.image.id_for_label }}" class="form-label">Image</label>
                            {% if post.image %}
                                <div class="mb-2">
                                    <img src="{{ post.image.url }}" alt="Current Image" style="max-width: 200px; display: block;">
                                    <small class="text-muted">Currently: {{ post.image.name }}</small>
                                </div>
                            {% endif %}
                            {{ form.image }}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">Update Post</button>
                            <a href="{% url 'index' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
